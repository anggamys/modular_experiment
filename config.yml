model:
  model_name: 'indobenchmark/indobert-base-p1'
  num_labels: null
  hidden_size: 768
  freeze_bert: false

training:
  batch_size: 32
  num_epochs: 1
  learning_rate: 2e-5
  weight_decay: 0.01
  warmup_steps: 500
  max_grad_norm: 1.0
  device: 'cuda'

data:
  test_size: 0.2
  validation_size: 0.1
  random_state: 42
  max_length: 128

output:
  model_save_dir: './checkpoints'

experiment:
  name: 'indobert_postag_baseline'
  description: 'IndoBERT fine-tuning for POS tagging'
  seed: 42
